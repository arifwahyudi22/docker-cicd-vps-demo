services:
  app:
    build:
      context: .
    image: docker-cicd-vps-demo:local
    container_name: docker-cicd-vps-demo
    environment:
      APP_VERSION: local
      COMMIT_SHA: local
      NODE_ENV: development
      PORT: 3000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
